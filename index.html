<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🛏️ Кровать №1</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8fafc; padding: 16px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .catalog { max-width: 500px; width: 100%; margin: 0 auto; }
        h1 { font-weight: 600; font-size: 28px; color: #1e293b; margin-bottom: 20px; text-align: center; }

        /* Админ-панель */
        .admin-panel {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 24px;
            border: 2px solid #3b82f6; box-shadow: 0 8px 20px rgba(59,130,246,0.1);
        }
        .admin-title { font-weight: 700; font-size: 18px; color: #1e293b; margin-bottom: 16px; }
        .form-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
        .form-row input {
            padding: 14px 16px; border: 1.5px solid #e2e8f0;
            border-radius: 16px; font-size: 14px; background: white;
        }
        .form-row button {
            background: #3b82f6; color: white; border: none; padding: 14px 20px;
            border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer;
        }
        .admin-hint { font-size: 12px; color: #64748b; margin-top: 8px; }

        /* Карточка */
        .card {
            background: white; border-radius: 24px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #e2e8f0;
        }
        .card-image { width: 100%; height: 280px; object-fit: cover; display: block; }
        .card-content { padding: 20px; }
        .card-title { font-weight: 700; font-size: 24px; color: #0f172a; margin-bottom: 12px; }
        .price { font-weight: 700; font-size: 26px; color: #1e293b; margin-bottom: 16px; }
        .admin-actions { display: flex; gap: 10px; margin-bottom: 16px; }
        .admin-actions button {
            background: none; border: 1px solid #cbd5e1; padding: 8px 16px;
            border-radius: 30px; font-size: 14px; cursor: pointer; flex: 1;
        }

        /* Галерея (свайпы) */
        .gallery-container {
            position: relative; width: 100%; overflow: hidden;
            border-radius: 16px; margin-bottom: 16px; touch-action: pan-y pinch-zoom;
        }
        .gallery-slides {
            display: flex; transition: transform 0.3s ease;
            cursor: grab; user-select: none;
        }
        .gallery-slides:active { cursor: grabbing; }
        .gallery-slides img {
            width: 100%; height: 280px; object-fit: cover;
            flex-shrink: 0; pointer-events: none;
        }
        .gallery-dots {
            display: flex; justify-content: center; gap: 8px; margin: 12px 0;
        }
        .gallery-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1;
            transition: background 0.2s; cursor: pointer;
        }
        .gallery-dot.active { background: #3b82f6; width: 20px; border-radius: 10px; }

        /* Модальное окно (калькулятор) */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; }
        .modal-close { float: right; font-size: 28px; cursor: pointer; background: none; border: none; }
        .config-section { background: #f8fafc; border-radius: 20px; padding: 20px; margin: 20px 0; }
        .config-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
        .config-row:last-child { border-bottom: none; }
        .config-label { font-weight: 500; }
        .config-options { display: flex; gap: 16px; flex-wrap: wrap; }
        .config-options label { cursor: pointer; }
        .total-price { font-size: 28px; font-weight: 700; color: #1e293b; text-align: right; margin-top: 20px; }
        .btn-kp {
            background: #10b981; color: white; border: none; padding: 16px 20px;
            border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; width: 100%;
        }
        .kp-output {
            background: #f1f5f9; border-radius: 16px; padding: 16px; margin-top: 20px;
            font-size: 14px; line-height: 1.6; white-space: pre-wrap;
        }
        .copy-btn { margin-top: 10px; background: #64748b; color: white; border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="catalog">
    <h1>🛏️ Кровать №1</h1>

    <!-- Админ-панель -->
    <div class="admin-panel">
        <div class="admin-title">⚙️ Редактировать кровать</div>
        <div class="form-row">
            <input type="text" id="bedBasePrice" placeholder="Базовая цена (120 см)" value="45000" />
        </div>
        <div class="form-row">
            <input type="text" id="bedPhotos" placeholder="Ссылки на фото через запятую" value="https://i6.imageban.ru/out/2026/04/19/62fe99338a690192595be1be2bd0ff71.png,https://i2.imageban.ru/out/2026/04/19/0472f1d71454dc948f7357736c96fc9d.png,https://i6.imageban.ru/out/2026/04/19/cfa727da9a061bd51657a803e7a28165.png" />
        </div>
        <div class="form-row">
            <input type="text" id="priceWidth140" placeholder="+ цена за 140 см" value="3000" />
            <input type="text" id="priceWidth160" placeholder="+ цена за 160 см" value="7000" />
            <input type="text" id="priceWidth180" placeholder="+ цена за 180 см" value="11000" />
            <input type="text" id="priceWidth200" placeholder="+ цена за 200 см" value="15000" />
        </div>
        <div class="form-row">
            <input type="text" id="priceTeddy" placeholder="+ велюр Teddy" value="4000" />
            <input type="text" id="priceLamels" placeholder="+ усиленная решётка" value="10000" />
            <input type="text" id="priceLift" placeholder="+ подъёмный механизм" value="9000" />
        </div>
        <div class="form-row">
            <button id="saveBedBtn">💾 Сохранить изменения</button>
        </div>
        <div class="admin-hint">
            💡 Меняйте цену, фото и наценки. Всё сохраняется в браузере.
        </div>
    </div>

    <!-- Карточка кровати -->
    <div class="card">
        <!-- Галерея со свайпами -->
        <div class="gallery-container" id="galleryContainer">
            <div class="gallery-slides" id="gallerySlides"></div>
        </div>
        <div class="gallery-dots" id="galleryDots"></div>

        <div class="card-content">
            <div class="card-title" id="bedTitle">Кровать №1</div>
            <div class="price" id="bedPrice">от 45 000 ₽</div>
            <div class="admin-actions">
                <button id="configBtn">⚙️ Настроить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно калькулятора -->
<div id="configModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="document.getElementById('configModal').classList.remove('active')">&times;</button>
        <h2>Настройка кровати</h2>
        <div class="config-section">
            <div class="config-row">
                <span class="config-label">Ширина (длина 200 см):</span>
                <div class="config-options" id="widthOptions"></div>
            </div>
            <div class="config-row">
                <span class="config-label">Ткань (велюр):</span>
                <div class="config-options" id="fabricOptions"></div>
            </div>
            <div class="config-row">
                <span class="config-label">Ортопедическая решётка:</span>
                <div class="config-options" id="baseOptions"></div>
            </div>
            <div class="config-row">
                <span class="config-label">Подъёмный механизм:</span>
                <div class="config-options">
                    <label><input type="radio" name="lift" value="0" checked> Не нужно</label>
                    <label><input type="radio" name="lift" value="1"> Нужно (<span id="liftPrice">9000</span> ₽)</label>
                </div>
            </div>
        </div>
        <div class="total-price">Итого: <span id="totalPrice">45 000</span> ₽</div>
        <button class="btn-kp" id="generateKpBtn">📋 Сформировать КП</button>
        <div id="kpOutput" class="kp-output" style="display:none;"></div>
        <button id="copyKpBtn" class="copy-btn" style="display:none;">📋 Скопировать КП</button>
    </div>
</div>

<script>
(function(){
    const STORAGE_KEY = 'bed_single_v1';

    // Данные по умолчанию
    const defaultBed = {
        basePrice: 45000,
        photos: [
            'https://i6.imageban.ru/out/2026/04/19/62fe99338a690192595be1be2bd0ff71.png',
            'https://i2.imageban.ru/out/2026/04/19/0472f1d71454dc948f7357736c96fc9d.png',
            'https://i6.imageban.ru/out/2026/04/19/cfa727da9a061bd51657a803e7a28165.png'
        ],
        prices: { width140: 3000, width160: 7000, width180: 11000, width200: 15000, teddy: 4000, lamels: 10000, lift: 9000 }
    };

    let bed = loadBed();
    function loadBed() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { try { return JSON.parse(saved); } catch(e) { return {...defaultBed}; } }
        return {...defaultBed};
    }
    function saveBed() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bed)); }

    // Галерея
    let currentSlide = 0;
    function renderGallery() {
        const slides = document.getElementById('gallerySlides');
        const dots = document.getElementById('galleryDots');
        slides.innerHTML = bed.photos.map(p => `<img src="${p}" draggable="false">`).join('');
        dots.innerHTML = bed.photos.map((_, i) => `<div class="gallery-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');
        updateSlidePosition(0);
        currentSlide = 0;

        // Свайпы
        const container = document.getElementById('galleryContainer');
        let startX = 0, currentX = 0, isDragging = false;
        
        container.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX; isDragging = true;
        }, {passive: true});
        container.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            const diff = startX - currentX;
            const slideWidth = container.offsetWidth;
            const slidesCount = bed.photos.length;
            let newIndex = currentSlide;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentSlide < slidesCount - 1) newIndex++;
                else if (diff < 0 && currentSlide > 0) newIndex--;
                startX = currentX;
            }
            updateSlidePosition(newIndex);
        }, {passive: true});
        container.addEventListener('touchend', () => { isDragging = false; });

        // Клик по точкам
        dots.querySelectorAll('.gallery-dot').forEach(dot => {
            dot.addEventListener('click', () => updateSlidePosition(parseInt(dot.dataset.index)));
        });
    }

    function updateSlidePosition(index) {
        const slides = document.getElementById('gallerySlides');
        const container = document.getElementById('galleryContainer');
        const slideWidth = container.offsetWidth;
        slides.style.transform = `translateX(-${index * slideWidth}px)`;
        currentSlide = index;
        document.querySelectorAll('.gallery-dot').forEach((d, i) => {
            d.classList.toggle('active', i === index);
        });
    }

    // Обновление карточки
    function updateCard() {
        document.getElementById('bedTitle').textContent = 'Кровать №1';
        document.getElementById('bedPrice').textContent = `от ${bed.basePrice.toLocaleString()} ₽`;
        renderGallery();
        updateCalculator();
    }

    // Калькулятор
    function updateCalculator() {
        document.getElementById('liftPrice').textContent = (bed.prices.lift || 9000).toLocaleString();
        const widths = [
            { val: 120, label: '120 см', price: 0 },
            { val: 140, label: '140 см', price: bed.prices.width140 || 0 },
            { val: 160, label: '160 см', price: bed.prices.width160 || 0 },
            { val: 180, label: '180 см', price: bed.prices.width180 || 0 },
            { val: 200, label: '200 см', price: bed.prices.width200 || 0 }
        ];
        document.getElementById('widthOptions').innerHTML = widths.map((w, i) => 
            `<label><input type="radio" name="width" value="${w.val}" data-price="${w.price}" ${i === 0 ? 'checked' : ''}> ${w.label} ${w.price > 0 ? '(+' + w.price + ' ₽)' : ''}</label>`
        ).join('');
        const fabrics = [
            { val: 'seven', label: 'Велюр Seven', price: 0 },
            { val: 'teddy', label: 'Велюр Teddy', price: bed.prices.teddy || 4000 }
        ];
        document.getElementById('fabricOptions').innerHTML = fabrics.map((f, i) => 
            `<label><input type="radio" name="fabric" value="${f.val}" data-price="${f.price}" ${i === 0 ? 'checked' : ''}> ${f.label} ${f.price > 0 ? '(+' + f.price + ' ₽)' : ''}</label>`
        ).join('');
        const bases = [
            { val: 'std', label: 'Стандартная', price: 0 },
            { val: 'lamels', label: 'Усиленная (с ламелями)', price: bed.prices.lamels || 10000 }
        ];
        document.getElementById('baseOptions').innerHTML = bases.map((b, i) => 
            `<label><input type="radio" name="base" value="${b.val}" data-price="${b.price}" ${i === 0 ? 'checked' : ''}> ${b.label} ${b.price > 0 ? '(+' + b.price + ' ₽)' : ''}</label>`
        ).join('');
        document.querySelectorAll('input[name="width"], input[name="fabric"], input[name="base"], input[name="lift"]').forEach(el => el.addEventListener('change', updateTotal));
        updateTotal();
    }

    function updateTotal() {
        const base = bed.basePrice;
        const widthPrice = parseInt(document.querySelector('input[name="width"]:checked')?.dataset.price || 0);
        const fabricPrice = parseInt(document.querySelector('input[name="fabric"]:checked')?.dataset.price || 0);
        const basePrice = parseInt(document.querySelector('input[name="base"]:checked')?.dataset.price || 0);
        const liftPrice = document.querySelector('input[name="lift"]:checked')?.value === '1' ? (bed.prices.lift || 9000) : 0;
        document.getElementById('totalPrice').textContent = (base + widthPrice + fabricPrice + basePrice + liftPrice).toLocaleString();
    }

    // КП
    document.getElementById('generateKpBtn').addEventListener('click', () => {
        const widthLabel = document.querySelector('input[name="width"]:checked')?.parentElement?.textContent?.trim() || '120 см';
        const fabricLabel = document.querySelector('input[name="fabric"]:checked')?.parentElement?.textContent?.trim() || 'Велюр Seven';
        const baseLabel = document.querySelector('input[name="base"]:checked')?.parentElement?.textContent?.trim() || 'Стандартная';
        const lift = document.querySelector('input[name="lift"]:checked')?.value === '1' ? 'с подъёмным механизмом' : 'без подъёмного механизма';
        const total = document.getElementById('totalPrice').textContent;
        const kpText = `Коммерческое предложение на кровать №1\n\nВыбранные опции:\n• Ширина: ${widthLabel}\n• Ткань: ${fabricLabel}\n• Ортопедическая решётка: ${baseLabel}\n• Подъёмный механизм: ${lift}\n\nИТОГО: ${total} ₽\n\nДля оформления заказа свяжитесь с менеджером.`;
        const kpDiv = document.getElementById('kpOutput');
        kpDiv.textContent = kpText;
        kpDiv.style.display = 'block';
        document.getElementById('copyKpBtn').style.display = 'block';
    });

    document.getElementById('copyKpBtn').addEventListener('click', () => {
        navigator.clipboard?.writeText(document.getElementById('kpOutput').textContent).then(() => alert('✅ КП скопировано!'));
    });

    // Сохранение из админки
    document.getElementById('saveBedBtn').addEventListener('click', () => {
        bed.basePrice = parseInt(document.getElementById('bedBasePrice').value) || 45000;
        const photosStr = document.getElementById('bedPhotos').value.trim();
        bed.photos = photosStr ? photosStr.split(',').map(s => s.trim()).filter(s => s) : defaultBed.photos;
        bed.prices = {
            width140: parseInt(document.getElementById('priceWidth140').value) || 0,
            width160: parseInt(document.getElementById('priceWidth160').value) || 0,
            width180: parseInt(document.getElementById('priceWidth180').value) || 0,
            width200: parseInt(document.getElementById('priceWidth200').value) || 0,
            teddy: parseInt(document.getElementById('priceTeddy').value) || 4000,
            lamels: parseInt(document.getElementById('priceLamels').value) || 10000,
            lift: parseInt(document.getElementById('priceLift').value) || 9000
        };
        saveBed(); updateCard(); updateCalculator();
        alert('✅ Кровать обновлена!');
    });

    document.getElementById('configBtn').addEventListener('click', () => {
        updateCalculator();
        document.getElementById('configModal').classList.add('active');
    });

    window.addEventListener('resize', () => updateSlidePosition(currentSlide));
    updateCard(); updateCalculator();
})();
</script>
</body>
</html>
