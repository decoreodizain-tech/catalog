<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛏️ Каталог кроватей</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8fafc; padding: 24px; min-height: 100vh; }
        .catalog { max-width: 1400px; margin: 0 auto; }
        h1 { font-weight: 600; font-size: 32px; color: #1e293b; margin-bottom: 8px; }
        .subtitle { color: #64748b; margin-bottom: 32px; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card-image { width: 100%; height: 240px; object-fit: cover; background: #f1f5f9; }
        .card-content { padding: 20px; }
        .card-title { font-weight: 700; font-size: 22px; color: #0f172a; margin-bottom: 8px; }
        .card-desc { color: #475569; font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .price { font-weight: 700; font-size: 26px; color: #1e293b; }
    </style>
</head>
<body>
<div class="catalog">
    <h1>🛏️ Каталог кроватей</h1>
    <div class="subtitle">Выберите идеальную кровать для вашего интерьера</div>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=600&h=400&fit=crop" alt="Кровать №1" class="card-image">
            <div class="card-content">
                <div class="card-title">Кровать №1 — Элеганс</div>
                <div class="card-desc">Двуспальная кровать с мягким изголовьем. Каркас из массива дерева, обивка — велюр.</div>
                <div class="card-footer">
                    <div class="price">45 000 ₽</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
