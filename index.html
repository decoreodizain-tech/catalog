<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛏️ Каталог кроватей</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8fafc; padding: 24px; min-height: 100vh; }
        .catalog { max-width: 1400px; margin: 0 auto; }
        h1 { font-weight: 600; font-size: 32px; color: #1e293b; margin-bottom: 8px; }
        .subtitle { color: #64748b; margin-bottom: 32px; font-size: 16px; }
        
        /* Сетка — колонки уже, чтобы влезало 6-9 карточек */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); 
            border: 1px solid #e2e8f0; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 16px 30px rgba(0,0,0,0.08); 
        }
        
        /* Фото — компактное, кликабельное */
        .card-image { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            background: #f1f5f9; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        .card-image:hover { opacity: 0.9; }
        
        .card-content { padding: 16px; }
        .card-title { 
            font-weight: 700; 
            font-size: 18px; 
            color: #0f172a; 
            margin-bottom: 6px; 
        }
        .card-desc { 
            color: #475569; 
            font-size: 13px; 
            line-height: 1.4; 
            margin-bottom: 14px; 
        }
        .card-footer { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-top: 6px; 
        }
        .price { 
            font-weight: 700; 
            font-size: 22px; 
            color: #1e293b; 
        }
        
        /* Подсказка при наведении */
        .image-hint {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="catalog">
    <h1>🛏️ Каталог кроватей</h1>
    <div class="subtitle">Выберите идеальную кровать для вашего интерьера</div>
    <div class="grid">
        <!-- Кровать 1 -->
        <div class="card">
            <img src="https://i7.imageban.ru/out/2026/04/18/2cb8237c0c09fb2d8f1e2d8bad13590f.png" 
                 alt="Кровать Элеганс" 
                 class="card-image" 
                 onclick="window.open(this.src, '_blank')">
            <div class="image-hint">🔍 Нажмите на фото, чтобы увеличить</div>
            <div class="card-content">
                <div class="card-title">Элеганс</div>
                <div class="card-desc">Двуспальная кровать с мягким изголовьем. Каркас из массива дерева, обивка — велюр.</div>
                <div class="card-footer">
                    <div class="price">45 000 ₽</div>
                </div>
            </div>
        </div>
        
        <!-- Кровать 2 (пример, можно добавить позже) -->
        <!--
        <div class="card">
            <img src="ССЫЛКА_НА_ФОТО_2" alt="Кровать" class="card-image" onclick="window.open(this.src, '_blank')">
            <div class="image-hint">🔍 Нажмите на фото, чтобы увеличить</div>
            <div class="card-content">
                <div class="card-title">Название</div>
                <div class="card-desc">Описание кровати.</div>
                <div class="card-footer">
                    <div class="price">Цена</div>
                </div>
            </div>
        </div>
        -->
    </div>
</div>
</body>
</html>
